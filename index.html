<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Roma &amp; Prashant · Wedding</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,600&family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Noto+Serif+Devanagari:wght@400;600;700&family=Noto+Sans+Devanagari:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --gold:#e0a030; --gold-soft:rgba(224,160,48,.25); --gold-bright:#e8c869;
  --ink:#f4e8cf; --rust:#e8a55f; --teal:#5fa89c; --muted:#9a8a70;
  --line:rgba(224,160,48,.24); --card:rgba(255,250,235,.065);
  --p-roma:#5fa89c; --p-pfam:#e8a55f; --p-all:#e8c869;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{ font-family:'DM Mono',monospace; color:var(--ink);
  background:linear-gradient(118deg,#3a1f1a 0%,#5a2e1e 34%,#3a3b2e 58%,#1e3329 100%);
  background-attachment:fixed; min-height:100vh; padding-bottom:80px; position:relative; overflow-x:hidden;}
@media (prefers-reduced-motion: reduce){ *{animation:none !important;} }

/* ambient marigold petals */
.petal-layer{ position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden;}
.petal{ position:absolute; top:-16px; opacity:0; animation:fall linear infinite;}
@keyframes fall{ 0%{transform:translateY(-16px) rotate(0);opacity:0;} 10%{opacity:.7;} 90%{opacity:.55;} 100%{transform:translateY(102vh) rotate(340deg);opacity:0;} }

/* side culture frames */
.frameL,.frameR{ position:fixed; top:60px; bottom:0; width:22px; z-index:0; opacity:.5; pointer-events:none;}
.frameL{ left:0;} .frameR{ right:0;}
.frameL svg,.frameR svg{ width:100%; height:100%;}
.draw path,.draw line,.draw circle{ stroke-dasharray:240; stroke-dashoffset:240; animation:draw 2.4s ease forwards;}
@keyframes draw{ to{stroke-dashoffset:0;} }
main, header, nav{ position:relative; z-index:2;}
body.lang-hi, body.lang-mr{ font-family:'Noto Sans Devanagari',sans-serif;}
.serif{ font-family:'Cormorant Garamond',serif;} .disp{ font-family:'Fraunces',serif;}
body.lang-hi .serif,body.lang-mr .serif,body.lang-hi .disp,body.lang-mr .disp{ font-family:'Noto Serif Devanagari',serif;}
header{ text-align:center; padding:42px 16px 14px; position:relative;}
.toran{ position:absolute; top:0; left:0; right:0; height:34px; z-index:1; transform-origin:top center; animation:sway 4.5s ease-in-out infinite;}
@keyframes sway{ 0%,100%{transform:rotate(-.6deg);} 50%{transform:rotate(.6deg);} }
.toran svg{ width:100%; height:100%; display:block;}
.diya-glow{ position:absolute; top:30px; left:50%; transform:translateX(-50%); width:230px; height:120px; border-radius:50%;
  background:radial-gradient(circle,rgba(224,160,48,.4),transparent 70%); filter:blur(30px); z-index:0; animation:pulse 3.6s ease-in-out infinite;}
@keyframes pulse{ 0%,100%{opacity:.5;transform:translateX(-50%) scale(1);} 50%{opacity:.85;transform:translateX(-50%) scale(1.08);} }
header > *:not(.toran):not(.diya-glow){ position:relative; z-index:2;}
header::after{ content:"✦  ✦  ✦"; position:absolute; bottom:5px; left:0; right:0; font-size:7px; color:var(--gold); letter-spacing:8px; opacity:.5; z-index:2;}
.kicker{ font-size:9px; letter-spacing:3px; color:var(--gold-bright);}
h1{ font-family:'Fraunces',serif; font-weight:700; font-size:30px; margin:3px 0 1px; line-height:1.1; color:#f4e8cf; text-shadow:0 2px 12px rgba(224,160,48,.2);}
body.lang-hi h1,body.lang-mr h1{ font-family:'Noto Serif Devanagari',serif;}
h1 .amp{ color:var(--gold); font-style:italic;}
.sub{ font-family:'Cormorant Garamond',serif; font-style:italic; font-size:14px; color:#cBae7a;}
body.lang-hi .sub,body.lang-mr .sub{ font-family:'Noto Serif Devanagari',serif; font-style:normal;}
.countdown{ margin-top:8px; font-size:11px; color:var(--gold-bright); letter-spacing:1px;}
.countdown .cd-num{ font-family:'Fraunces',serif; font-size:19px; font-weight:700; color:var(--gold); vertical-align:-2px;}
.pstrip{ display:flex; justify-content:space-between; gap:4px; padding:6px 4px 12px; margin-bottom:4px; overflow-x:auto;}
.pring{ display:flex; flex-direction:column; align-items:center; gap:3px; flex:1; min-width:46px;}
.pring span{ font-size:9px; color:var(--muted); letter-spacing:.5px;}
.burst{ position:fixed; z-index:60; pointer-events:none; animation:burstUp 2.4s ease-out forwards;}
@keyframes burstUp{ 0%{transform:translateY(0) scale(.4);opacity:0;} 12%{opacity:1;transform:translateY(-40px) scale(1);} 100%{transform:translateY(60vh) rotate(360deg);opacity:0;} }
.celebrate-toast{ position:fixed; top:34%; left:50%; transform:translateX(-50%); z-index:70;
  background:linear-gradient(135deg,#5a2e1e,#1e3329); border:1px solid var(--gold); color:var(--gold-bright);
  font-family:'Cormorant Garamond',serif; font-size:19px; font-weight:700; padding:12px 22px; border-radius:14px;
  box-shadow:0 8px 30px rgba(0,0,0,.4); animation:toastPop 2.6s ease forwards; white-space:nowrap;}
body.lang-hi .celebrate-toast,body.lang-mr .celebrate-toast{ font-family:'Noto Serif Devanagari',serif;}
@keyframes toastPop{ 0%{opacity:0;transform:translateX(-50%) scale(.7);} 12%,80%{opacity:1;transform:translateX(-50%) scale(1);} 100%{opacity:0;transform:translateX(-50%) scale(.95);} }
.controls{ display:flex; gap:8px; justify-content:center; align-items:center; margin-top:10px; flex-wrap:wrap;}
.lang-switch{ display:inline-flex; gap:3px; background:rgba(0,0,0,.2); border-radius:14px; padding:3px;}
.lang-switch button{ background:none; border:none; color:var(--muted); font-family:inherit; font-size:10px; padding:4px 9px; border-radius:11px;}
.lang-switch button.on{ background:var(--gold); color:var(--bg1); font-weight:600;}
.whoBtn{ background:none; border:1px solid var(--line); color:var(--teal); border-radius:16px; padding:5px 12px; font-family:inherit; font-size:10px;}
.sync{ display:flex; align-items:center; justify-content:center; gap:5px; font-size:9px; color:var(--muted); margin-top:8px;}
.dot{ width:7px;height:7px;border-radius:50%; background:var(--gold);}
.dot.on{ background:var(--teal); box-shadow:0 0 0 3px rgba(95,168,156,.2);}
.dot.off{ background:var(--rust);}
main{ padding:6px 14px 20px; max-width:560px; margin:0 auto;}
.panel{ display:none;} .panel.active{ display:block; animation:leafturn .4s cubic-bezier(.2,.7,.3,1);}
@keyframes leafturn{ 0%{opacity:0;transform:perspective(800px) rotateY(8deg) translateY(8px);} 100%{opacity:1;transform:none;} }
.month{ margin:17px 0 6px; padding-left:2px;}
.month h2{ font-family:'Cormorant Garamond',serif; color:var(--rust); font-size:22px; margin:0; font-weight:700;}
body.lang-hi .month h2,body.lang-mr .month h2{ font-family:'Noto Serif Devanagari',serif;}
.month .tag{ font-size:9px; color:var(--teal); letter-spacing:1.5px;}
.card{ background:var(--card); border:1px solid var(--line); border-radius:15px; padding:13px 14px; margin-bottom:11px; box-shadow:0 4px 18px rgba(0,0,0,.18);}
.item{ display:flex; align-items:flex-start; gap:11px; padding:9px 2px; border-bottom:1px solid rgba(212,168,67,.12);}
.item:last-child{ border-bottom:none;}
.item .box{ width:22px;height:22px;min-width:22px; border:1.8px solid var(--gold); border-radius:6px; margin-top:1px; display:flex;align-items:center;justify-content:center; transition:.15s;}
.item.done .box{ background:var(--teal); border-color:var(--teal);}
.item.done .box::after{ content:"✓"; color:#0d1a18; font-size:13px; font-weight:700;}
.item .txt{ flex:1; font-size:13px; line-height:1.4;}
.item.done .txt{ color:var(--muted); text-decoration:line-through;}
.owner{ font-size:9px; padding:2px 8px; border-radius:11px; white-space:nowrap; margin-top:2px; font-weight:500;}
.decision{ margin-bottom:20px;}
.decision .q{ font-family:'Cormorant Garamond',serif; font-size:19px; font-weight:600; margin-bottom:10px; color:#f0e2c4;}
body.lang-hi .decision .q,body.lang-mr .decision .q{ font-family:'Noto Serif Devanagari',serif;}
.opt{ border:1px solid var(--line); border-radius:13px; padding:11px 13px; margin-bottom:9px; background:var(--card);}
.opt .top{ display:flex; justify-content:space-between; align-items:center; gap:10px;}
.opt .label{ font-size:13px;}
.votebtn{ border:1px solid var(--teal); color:var(--teal); background:none; border-radius:18px; padding:6px 14px; font-family:inherit; font-size:10px; white-space:nowrap;}
.opt.voted .votebtn{ background:var(--teal); color:var(--bg1); font-weight:600;}
.bar{ height:7px; background:rgba(212,168,67,.15); border-radius:4px; margin-top:9px; overflow:hidden;}
.bar>i{ display:block; height:100%; background:linear-gradient(90deg,var(--teal),var(--gold)); width:0; transition:width .4s;}
.tally{ font-size:9px; color:var(--muted); margin-top:6px; display:flex; justify-content:space-between; gap:8px;}
.voters{ display:flex; gap:4px; flex-wrap:wrap; justify-content:flex-end;}
.vdot{ width:15px;height:15px;border-radius:50%; font-size:8px; display:inline-flex; align-items:center; justify-content:center; color:#0d1a18; font-weight:700;}
.vendor{ display:flex; align-items:center; gap:11px; padding:11px 2px; border-bottom:1px solid rgba(212,168,67,.12);}
.vendor:last-child{ border-bottom:none;}
.vavatar{ width:38px;height:38px;border-radius:50%; display:flex;align-items:center;justify-content:center; font-family:'Cormorant Garamond',serif; font-size:17px; font-weight:700; color:#0d1a18;}
.vinfo{ flex:1;} .vinfo .vn{ font-size:13px;} .vinfo .vr{ font-size:10px; color:var(--muted);}
.vstatus{ font-size:9px; padding:5px 10px; border-radius:12px; border:none; font-family:inherit;}
.s-wait{ background:rgba(212,168,67,.16); color:var(--gold);}
.s-replied{ background:rgba(95,168,156,.18); color:var(--teal);}
.s-booked{ background:var(--teal); color:var(--bg1); font-weight:600;}
.addrow{ display:flex; gap:8px; margin-bottom:12px;}
.addrow input{ flex:1; border:1px solid var(--line); border-radius:11px; padding:11px; font-family:inherit; font-size:13px; background:rgba(0,0,0,.2); color:var(--ink);}
.addrow input::placeholder{ color:var(--muted);}
.addrow input:focus{ outline:none; border-color:var(--teal);}
.addrow button{ background:var(--teal); color:var(--bg1); border:none; border-radius:11px; padding:0 16px; font-size:18px; font-weight:700;}
.brow{ display:flex; align-items:center; gap:10px; padding:10px 2px; border-bottom:1px solid rgba(212,168,67,.12);}
.brow .bcat{ flex:1; font-size:13px;} .brow .bamt{ font-size:12px; color:var(--gold);}
.budget-total{ display:flex; justify-content:space-between; font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:700; padding:13px 4px 2px; color:var(--rust);}
body.lang-hi .budget-total,body.lang-mr .budget-total{ font-family:'Noto Serif Devanagari',serif;}
.empty{ text-align:center; color:var(--muted); font-style:italic; font-family:'Cormorant Garamond',serif; padding:24px; font-size:15px;}
.banner{ background:rgba(217,140,95,.1); border:1px solid rgba(217,140,95,.4); color:#e8b89a; border-radius:12px; padding:11px 13px; font-size:11px; line-height:1.5; margin:10px 0;}
nav{ position:fixed; bottom:0; left:0; right:0; background:rgba(13,18,16,.82); backdrop-filter:blur(12px); border-top:1px solid var(--line); display:flex; justify-content:space-around; padding:8px 4px calc(8px + env(safe-area-inset-bottom)); z-index:50;}
nav button{ background:none;border:none; display:flex; flex-direction:column; align-items:center; gap:2px; color:var(--muted); font-family:inherit; font-size:7.5px; padding:4px 2px; flex:1;}
nav button.active{ color:var(--gold);}
nav button svg{ width:18px;height:18px; stroke:currentColor;}
/* venn / family split */
.venn{ display:flex; align-items:center; justify-content:center; gap:0; margin:6px 0 10px;}
.venn .vc,.venn .vshared{ text-align:center; border-radius:50%; width:96px; height:96px; display:flex; flex-direction:column; align-items:center; justify-content:center;}
.venn .vc{ background:color-mix(in srgb, var(--c) 20%, transparent); border:1.5px solid var(--c);}
.venn .vc:first-child{ margin-right:-22px;} .venn .vc:last-child{ margin-left:-22px;}
.venn .vshared{ background:rgba(224,160,48,.16); border:1.5px solid var(--gold); width:80px; height:80px; z-index:2;}
.venn .vcount{ font-family:'Fraunces',serif; font-size:22px; font-weight:700; color:var(--ink);}
.venn .vlab{ font-size:8px; color:var(--muted); padding:0 4px; line-height:1.2;}
.tree-hint{ text-align:center; font-size:9px; color:var(--muted); letter-spacing:1px; margin-bottom:8px;}
/* wishes */
.wish{ background:var(--card); border-radius:12px; padding:11px 13px; margin-bottom:9px;}
.wtext{ font-family:'Cormorant Garamond',serif; font-size:15px; font-style:italic; color:var(--ink); line-height:1.4;}
body.lang-hi .wtext,body.lang-mr .wtext{ font-family:'Noto Serif Devanagari',serif; font-style:normal;}
.wby{ font-size:10px; margin-top:5px; text-align:right;}
/* soul */
.soul-intro{ text-align:center; padding:18px 6px;}
.soul-em{ font-size:26px; color:var(--gold); margin-bottom:4px;}
.soul-intro h2{ font-size:25px; color:var(--gold-bright); margin:0 0 12px;}
.soul-intro p{ font-size:12px; line-height:1.6; color:var(--ink); margin:0 auto 12px; max-width:340px;}
.soul-wait{ color:var(--rust)!important;}
.soul-note{ font-size:10.5px!important; color:var(--muted)!important; font-style:italic;}
.soul-section{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px 16px; margin-bottom:12px;}
.soul-section h3{ font-family:'Cormorant Garamond',serif; color:var(--gold); font-size:18px; margin:0 0 4px;}
body.lang-hi .soul-section h3,body.lang-mr .soul-section h3{ font-family:'Noto Serif Devanagari',serif;}
.soul-section .sys{ font-size:8px; letter-spacing:1.5px; color:var(--teal); margin-bottom:6px;}
.soul-section p{ font-size:12px; line-height:1.55; margin:0 0 8px;}
.soul-section .use{ background:rgba(95,168,156,.1); border-left:2px solid var(--teal); padding:7px 10px; border-radius:6px; font-size:11px; color:#bfe0d8;}
.modal{ position:fixed; inset:0; background:rgba(10,14,12,.7); display:flex; align-items:center; justify-content:center; z-index:100; padding:24px;}
.modal.hide{ display:none;}
.mbox{ background:#1b2724; border-radius:20px; padding:26px 24px; max-width:340px; width:100%; text-align:center; border:1px solid var(--gold);}
.mbox h3{ font-family:'Fraunces',serif; font-size:23px; margin:0 0 5px; color:#f0e2c4;}
body.lang-hi .mbox h3,body.lang-mr .mbox h3{ font-family:'Noto Serif Devanagari',serif;}
.mbox p{ font-size:11px; color:var(--muted); margin:0 0 18px; line-height:1.5;}
.who{ display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.who button{ border:1px solid var(--line); background:var(--card); border-radius:13px; padding:13px 8px; font-family:'Cormorant Garamond',serif; font-size:15px; color:var(--ink); display:flex; flex-direction:column; align-items:center; gap:6px;}
body.lang-hi .who button,body.lang-mr .who button{ font-family:'Noto Serif Devanagari',serif;}
.who button .swatch{ width:26px;height:26px;border-radius:50%;}
</style>
</head>

STATE.checks=STATE.checks||{};STATE.votes=STATE.votes||{};STATE.vendors=STATE.vendors||{};STATE.todos=STATE.todos||[];STATE.budget=STATE.budget||[];STATE.wishes=STATE.wishes||[];
function saveLocal(){ localStorage.setItem('wp_state',JSON.stringify(STATE)); }

function ownerPill(o){ const color=OWNER_COLOR[o]||"var(--p-all)"; const map={ROMAFAM:"RomaFam",PRASHANTFAM:"PrashantFam",ALL:"ALL"};
  let label=o==="ALL"?"ALL":(T[lang].people[map[o]]||map[o]);
  return `<span class="owner" style="background:${color}22;color:${color}">${label}</span>`; }

function monthProgress(mi){ const items=MONTHS[lang][mi].items; let done=0;
  items.forEach((_,ii)=>{ if(STATE.checks[`${mi}-${ii}`]) done++; });
  return {done, total:items.length, pct:Math.round(done/items.length*100)}; }

function renderProgress(){
  const M=MONTHS[lang]; const short=['Jun','Aug','Sep','Oct','Nov'];
  let h=`<div class="pstrip">`;
  M.forEach((mo,mi)=>{ const p=monthProgress(mi); const r=15.5, circ=2*Math.PI*r, off=circ*(1-p.pct/100);
    h+=`<div class="pring" onclick="jumpMonth(${mi})">
      <svg width="42" height="42" viewBox="0 0 42 42"><circle cx="21" cy="21" r="${r}" fill="none" stroke="rgba(224,160,48,.18)" stroke-width="3.5"/>
      <circle cx="21" cy="21" r="${r}" fill="none" stroke="${p.pct===100?'#5fa89c':'var(--gold)'}" stroke-width="3.5" stroke-linecap="round"
        stroke-dasharray="${circ}" stroke-dashoffset="${off}" transform="rotate(-90 21 21)" style="transition:stroke-dashoffset .5s"/>
      <text x="21" y="25" text-anchor="middle" font-size="10" fill="var(--ink)" font-family="DM Mono">${p.pct}</text></svg>
      <span>${short[mi]}</span></div>`;
  });
  h+=`</div>`;
  document.getElementById('progressStrip').innerHTML=h;
}
function jumpMonth(mi){ const els=document.querySelectorAll('#plannerBody .month'); if(els[mi]) els[mi].scrollIntoView({behavior:'smooth',block:'start'}); }

function renderPlanner(){ const M=MONTHS[lang]; let h="";
  M.forEach((mo,mi)=>{ h+=`<div class="month"><h2 class="serif">${mo.m}</h2><div class="tag">${mo.tag}</div></div><div class="card">`;
    mo.items.forEach((it,ii)=>{ const key=`${mi}-${ii}`,done=STATE.checks[key];
      h+=`<div class="item ${done?'done':''}" onclick="toggleCheck('${key}')"><div class="box"></div><div class="txt">${it[0]}</div>${ownerPill(it[1])}</div>`;});
    h+=`</div>`; });
  document.getElementById('plannerBody').innerHTML=h; renderProgress(); }

function vdot(name){ const p=PEOPLE[name]; if(!p)return''; return `<span class="vdot" style="background:${p.color}" title="${name}">${p.init}</span>`; }

function renderDecisions(){ const D=DECISIONS[lang]; let h=familySplitHTML()+`<div class="tree-hint">${T[lang].splitTitle} · ${MONTHS[lang].reduce((a,m)=>a+m.items.length,0)} tasks total</div>`+`<div class="banner">${T[lang].decBanner}</div>`;
  D.forEach(d=>{ const votes=STATE.votes[d.id]||{}; const counts=d.opts.map((_,i)=>Object.values(votes).filter(v=>v===i).length); const total=Object.keys(votes).length;
    h+=`<div class="decision"><div class="q serif">${d.q}</div>`;
    d.opts.forEach((o,i)=>{ const mine=me&&votes[me]===i; const pct=total?Math.round(counts[i]/total*100):0;
      const voters=Object.keys(votes).filter(n=>votes[n]===i).map(vdot).join('');
      h+=`<div class="opt ${mine?'voted':''}"><div class="top"><div class="label">${o}</div><button class="votebtn" onclick="castVote('${d.id}',${i})">${mine?T[lang].voted:T[lang].voteBtn}</button></div><div class="bar"><i style="width:${pct}%"></i></div><div class="tally"><span>${counts[i]} ${counts[i]!==1?T[lang].votes:T[lang].vote1} · ${pct}%</span><span class="voters">${voters}</span></div></div>`; });
    h+=`</div>`; });
  document.getElementById('decisions').innerHTML=h; }

function renderVendors(){ const V=VENDORS[lang]; let h=`<div class="banner">${T[lang].venBanner}</div><div class="card">`;
  V.forEach((v,i)=>{ const st=STATE.vendors[i]||'wait'; const lbl={wait:T[lang].vWait,replied:T[lang].vReplied,booked:T[lang].vBooked}[st]; const cls={wait:'s-wait',replied:'s-replied',booked:'s-booked'}[st];
    h+=`<div class="vendor"><div class="vavatar" style="background:linear-gradient(135deg,var(--teal),var(--rust))">${v[0]}</div><div class="vinfo"><div class="vn">${v[1]}</div><div class="vr">${v[2]}</div></div><button class="vstatus ${cls}" onclick="cycleVendor(${i})">${lbl}</button></div>`; });
  h+=`</div>`; document.getElementById('vendors').innerHTML=h; }

function renderTodos(){ const l=document.getElementById('todoList');
  if(!STATE.todos.length){ l.innerHTML=`<div class="empty">${T[lang].todoEmpty}</div>`; return;}
  l.innerHTML=`<div class="card">`+STATE.todos.map((t,i)=>{ const color=t.by&&PEOPLE[t.by]?PEOPLE[t.by].color:"var(--p-all)"; const lab=t.by?(T[lang].people[t.by]||t.by).split(' · ')[0]:'';
    return `<div class="item ${t.done?'done':''}" onclick="toggleTodo(${i})"><div class="box"></div><div class="txt">${t.text}</div>${t.by?`<span class="owner" style="background:${color}22;color:${color}">${lab}</span>`:''}</div>`;}).join('')+`</div>`; }

function renderBudget(){ const l=document.getElementById('budgetList'); let total=0;
  l.innerHTML=STATE.budget.length?STATE.budget.map((b,i)=>{ total+=Number(b.amt)||0; return `<div class="brow"><div class="bcat">${b.cat}</div><div class="bamt">₹${Number(b.amt).toLocaleString('en-IN')}</div><button class="vstatus s-wait" onclick="delBudget(${i})">✕</button></div>`;}).join(''):`<div class="empty">${T[lang].budgetEmpty}</div>`;
  document.getElementById('bTotal').textContent='₹'+total.toLocaleString('en-IN'); }

function renderAll(){ renderPlanner();renderDecisions();renderVendors();renderTodos();renderBudget();renderWishes();renderSoul(); }

function renderWishes(){ const l=document.getElementById('wishList'); if(!l)return;
  if(!STATE.wishes.length){ l.innerHTML=`<div class="empty">${T[lang].wishEmpty}</div>`; return;}
  l.innerHTML=STATE.wishes.map((w,i)=>{ const color=w.by&&PEOPLE[w.by]?PEOPLE[w.by].color:"var(--p-all)"; const lab=w.by?(T[lang].people[w.by]||w.by):'';
    return `<div class="wish" style="border-left:3px solid ${color}"><div class="wtext">"${w.text}"</div><div class="wby" style="color:${color}">— ${lab}</div></div>`;}).join(''); }
function addWish(){ const el=document.getElementById('newWish'),t=el.value.trim(); if(!t)return; STATE.wishes.unshift({text:t,by:me||''}); el.value=''; commit(); renderWishes(); }

function familySplitHTML(){
  // count owner tags across all months
  let roma=0,prashant=0,shared=0;
  MONTHS[lang].forEach(mo=>mo.items.forEach(it=>{ if(it[1]==='ROMAFAM')roma++; else if(it[1]==='PRASHANTFAM')prashant++; else shared++; }));
  return `<div class="venn">
    <div class="vc" style="--c:var(--p-roma)"><div class="vcount">${roma}</div><div class="vlab">${T[lang].people.RomaFam}</div></div>
    <div class="vshared"><div class="vcount">${shared}</div><div class="vlab">${T[lang].sharedTitle}</div></div>
    <div class="vc" style="--c:var(--p-pfam)"><div class="vcount">${prashant}</div><div class="vlab">${T[lang].people.PrashantFam}</div></div>
  </div>`;
}

const SOUL = { ready:true, content:{"en": "<div class=\"soul-intro\"><div class=\"soul-em\">✦</div><h2 class=\"serif\">The Soul of This Union</h2>\n<p>Two charts, read side by side, across the systems that have tried for centuries to name what holds people together. Not fortune-telling. A mirror. Here is what stands out, and how to actually use it.</p>\n<p class=\"soul-note\">Roma\'s reading is full. Prashant\'s deeper layers wait on his exact birth time and place. What\'s written for him here is true at the sun-and-number level; the rest gets added once we have his details.</p></div>\n\n<div class=\"soul-section\"><div class=\"sys\">THE THREAD THAT BINDS THEM</div><h3>Both ruled by Jupiter</h3>\n<p>Roma is Sagittarius. Prashant is Pisces. In the old system, these are the two signs Jupiter governs, the planet of faith, growth, generosity, and meaning. This is rare and worth pausing on: two people whose core natures answer to the same teacher.</p>\n<p>It means they are wired to grow, to believe in something larger, to be generous to a fault. The risk is also shared: both can overpromise, overextend, lose the thread of the practical.</p>\n<div class=\"use\">Live it: let one of you hold the vision and the other hold the ground, and trade roles often. Their marriage thrives on a shared sense of purpose. Decide early what you are building toward together, and return to it when small things scatter you.</div></div>\n\n<div class=\"soul-section\"><div class=\"sys\">VEDIC · THE MOON AND THE FIRE</div><h3>Sagittarius fire, Pisces water</h3>\n<p>Fire and water make steam, energy, movement, sometimes scald. Roma\'s Sagittarian fire is honest, restless, allergic to cages. Prashant\'s Piscean water is deep, absorbing, quietly intuitive. She moves toward the horizon; he feels the current beneath.</p>\n<p>Her nakshatra and his full chart need birth times to read truly. What\'s certain: her independence is not coldness, and his sensitivity is not weakness. Naming that early saves years.</p>\n<div class=\"use\">Live it: when she needs space, it is not rejection. When he goes quiet, it is not sulking, it is processing. Give each other the room your elements ask for.</div></div>\n\n<div class=\"soul-section\"><div class=\"sys\">NUMEROLOGY · THE LIFE PATH</div><h3>Roma walks 5, Prashant walks 3</h3>\n<p>Roma\'s Life Path is 5, the number of freedom, change, the senses, the traveller who must taste life directly. Prashant\'s is 3, the number of expression, joy, words, the one who makes things lighter.</p>\n<p>5 and 3 are an easy, playful pairing, both restless, both curious, neither one wanting a small grey life. Together they make a household that laughs and moves. The shadow: 5 can scatter, 3 can avoid hard feelings with charm. Neither naturally sits still in discomfort.</p>\n<div class=\"use\">Live it: build one steadying ritual that is just yours, a weekly walk, a Sunday meal, anything repeated. Two free spirits need one fixed point. Let that be your anchor.</div></div>\n\n<div class=\"soul-section\"><div class=\"sys\">CHINESE · DAY MASTER & ANIMAL</div><h3>Wood Dog meets Water Rooster</h3>\n<p>Roma is a Yang Wood Dog, loyal, principled, protective, a tree that shelters its people. Prashant is a Yin Water Rooster, sharp-eyed, articulate, precise, water that finds every crack and fills it.</p>\n<p>Dog and Rooster sit beside each other in the cycle, not a storybook match, not a clash either. It is the pairing that works through respect rather than fireworks. Wood is fed by water: his depth quietly nourishes her growth.</p>\n<div class=\"use\">Live it: she gives loyalty and steadiness; he gives clarity and detail. Let him be the one who notices what is missing, and let her be the one who decides it does not matter. That division of labour will save you a hundred arguments.</div></div>\n\n<div class=\"soul-section\"><div class=\"sys\">JUNG · WHAT EACH CARRIES FOR THE OTHER</div><h3>The seeker and the dreamer</h3>\n<p>In Jung\'s language, Roma carries the energy of the seeker, the one who leaves to find truth. Prashant carries the dreamer, the one who feels what cannot be said. Each holds the part the other has less of. That is the quiet engine of attraction, and later, of friction.</p>\n<div class=\"use\">Live it: the very thing that drew you will one day annoy you, her need to roam, his need to retreat. When it does, remember it is the same trait you fell for. Irritation is usually love that forgot why.</div></div>\n\n<div class=\"soul-section\"><div class=\"sys\">STOIC & HERMETIC · THE PRACTICE</div><h3>What is yours to control</h3>\n<p>The Stoics would tell this couple one thing: you cannot control your families, the weather on the day, or each other\'s moods, only your own response. A Jupiter marriage especially must guard against expecting too much and resenting the gap.</p>\n<p>The Hermetic principle, as above so below, means the small patterns become the large ones. How you handle one tense dinner is how you will handle a decade.</p>\n<div class=\"use\">Live it: in any conflict, each of you names only the one thing you can change in yourself. Not the other\'s fault, your own next move. Do this and most fights end before they start.</div></div>\n\n<div class=\"soul-section\"><div class=\"sys\">KABBALAH · THE BALANCE</div><h3>Giving and receiving</h3>\n<p>The tree of life turns on balance between Chesed (loving-kindness, expansion) and Gevurah (boundary, restraint). Two Jupiter people lean hard toward Chesed, give, give, expand, say yes. A lasting marriage needs Gevurah too: the loving no, the boundary that protects the yes.</p>\n<div class=\"use\">Live it: practise saying no, to guests, to obligations, to each other, without guilt. A boundary is not a wall. It is what keeps the generosity from draining you both dry.</div></div>\n\n<div class=\"soul-section\"><div class=\"sys\">HUMAN DESIGN · PENDING</div><h3>Needs birth times</h3>\n<p>Human Design type, authority, and strategy depend on exact birth time. Both are unconfirmed. Once we have Roma\'s and Prashant\'s birth times, this section reveals how each is built to make decisions, and how to make them together without overriding each other.</p>\n<div class=\"use\">For now: ask each set of parents for the birth time on the certificate or in family memory. It unlocks the most practical part of this whole reading.</div></div>\n\n<div class=\"soul-section\"><div class=\"sys\">THE DATES · ENERGY, NOT VERDICT</div><h3>December 24 to 27</h3>\n<p>A true muhurat is read by a pandit against the panchang, the tithi, nakshatra, and inauspicious windows of each specific day and hour. That is theirs to give, not mine to invent. What I can offer is gentle: late December sits in the Sagittarius season, Roma\'s own fire, which carries a natural warmth for a Jupiter union.</p>\n<div class=\"use\">Live it: take these four dates to a trusted pandit with both birth details. Let the family\'s vote in this app be the shortlist, and the pandit\'s reading be the final word. Tradition and tech, each doing what it does best.</div></div>\n\n<div class=\"soul-section\"><div class=\"sys\">THE ONE LINE TO KEEP</div><h3>Two believers, one ground</h3>\n<p>Everything above reduces to this: two generous, growth-hungry, Jupiter-ruled people who will build something expansive and meaningful, if they remember to also build something small, steady, and theirs. The vision will take care of itself. Protect the ordinary.</p></div>", "hi": "<div class=\"soul-intro\"><div class=\"soul-em\">✦</div><h2 class=\"serif\">इस मिलन की आत्मा</h2>\n<p>दो कुंडली, साथ-साथ पढ़ी गईं, उन परंपराओं से जो सदियों से यह बताने की कोशिश करती हैं कि लोगों को क्या जोड़े रखता है। भविष्यवाणी नहीं, एक आईना।</p>\n<p class=\"soul-note\">रोमा का पाठ पूरा है। प्रशांत की गहरी परतें उनके सही जन्म समय और स्थान पर निर्भर हैं।</p></div>\n\n<div class=\"soul-section\"><div class=\"sys\">जो धागा इन्हें बाँधता है</div><h3>दोनों पर गुरु (बृहस्पति) का शासन</h3>\n<p>रोमा धनु हैं, प्रशांत मीन। पुरानी पद्धति में ये दोनों राशियाँ बृहस्पति की हैं, श्रद्धा, विकास और उदारता का ग्रह। दो लोग जिनका मूल स्वभाव एक ही गुरु को उत्तर देता है, यह दुर्लभ है।</p>\n<div class=\"use\">जिएँ: एक दृष्टि थामे, दूसरा ज़मीन, और भूमिकाएँ बदलते रहें। पहले तय करें कि आप साथ मिलकर क्या बना रहे हैं।</div></div>\n\n<div class=\"soul-section\"><div class=\"sys\">अंक ज्योतिष</div><h3>रोमा 5, प्रशांत 3</h3>\n<p>रोमा का जीवन पथ 5 है, स्वतंत्रता और बदलाव का। प्रशांत का 3 है, अभिव्यक्ति और आनंद का। यह एक हल्की, चंचल जोड़ी है। छाया: 5 बिखर सकता है, 3 कठिन भावनाओं से बच सकता है।</p>\n<div class=\"use\">जिएँ: एक स्थिर साप्ताहिक रिवाज़ बनाएँ जो सिर्फ़ आपका हो। दो स्वतंत्र आत्माओं को एक स्थिर बिंदु चाहिए।</div></div>\n\n<div class=\"soul-section\"><div class=\"sys\">चीनी · डे मास्टर</div><h3>लकड़ी का कुत्ता, पानी का मुर्गा</h3>\n<p>रोमा यांग लकड़ी की कुत्ता, वफ़ादार और रक्षक। प्रशांत यिन पानी का मुर्गा, तेज़ नज़र, स्पष्ट। पानी लकड़ी को सींचता है, उसकी गहराई उसके विकास को पोषती है।</p>\n<div class=\"use\">जिएँ: वह वफ़ादारी और स्थिरता दे, वह स्पष्टता और बारीकी। यही बँटवारा सौ झगड़े बचाएगा।</div></div>\n\n<div class=\"soul-section\"><div class=\"sys\">तारीख़ें · ऊर्जा, फ़ैसला नहीं</div><h3>24 से 27 दिसंबर</h3>\n<p>असली मुहूर्त पंडित जी पंचांग से पढ़ते हैं। वह उनका काम है, मेरा गढ़ना नहीं। बस इतना: दिसंबर का अंत धनु ऋतु में है, रोमा की अपनी अग्नि।</p>\n<div class=\"use\">जिएँ: इन चार तारीख़ों को दोनों जन्म विवरण के साथ भरोसेमंद पंडित के पास ले जाएँ। ऐप का वोट सूची हो, पंडित का वचन अंतिम।</div></div>\n\n<div class=\"soul-section\"><div class=\"sys\">रखने लायक़ एक पंक्ति</div><h3>दो आस्थावान, एक ज़मीन</h3>\n<p>दो उदार, विकास के भूखे, गुरु-शासित लोग कुछ विशाल बनाएँगे, अगर वे कुछ छोटा, स्थिर और अपना भी बनाना याद रखें। दृष्टि अपना ध्यान रख लेगी। साधारण की रक्षा करें।</p></div>", "mr": "<div class=\"soul-intro\"><div class=\"soul-em\">✦</div><h2 class=\"serif\">या मिलनाची आत्मा</h2>\n<p>दोन कुंडल्या, शेजारी-शेजारी वाचलेल्या, ज्या परंपरांनी शतकानुशतके माणसांना काय जोडतं हे सांगण्याचा प्रयत्न केला. भविष्य नव्हे, एक आरसा.</p>\n<p class=\"soul-note\">रोमाचं वाचन पूर्ण आहे. प्रशांतच्या खोल थर त्याच्या नेमक्या जन्मवेळ व स्थानावर अवलंबून आहेत.</p></div>\n\n<div class=\"soul-section\"><div class=\"sys\">जो धागा यांना बांधतो</div><h3>दोघांवरही गुरूचं राज्य</h3>\n<p>रोमा धनु, प्रशांत मीन. जुन्या पद्धतीत या दोन्ही राशी गुरूच्या, श्रद्धा, वाढ आणि औदार्याचा ग्रह. दोन माणसं ज्यांचा मूळ स्वभाव एकाच गुरूला उत्तर देतो, हे दुर्मिळ.</p>\n<div class=\"use\">जगा: एकाने दृष्टी धरावी, दुसऱ्याने जमीन, आणि भूमिका बदलत राहाव्या. आधी ठरवा की तुम्ही एकत्र काय उभं करताय.</div></div>\n\n<div class=\"soul-section\"><div class=\"sys\">अंकशास्त्र</div><h3>रोमा 5, प्रशांत 3</h3>\n<p>रोमाचा जीवनमार्ग 5, स्वातंत्र्य आणि बदलाचा. प्रशांतचा 3, अभिव्यक्ती आणि आनंदाचा. ही हलकी, खेळकर जोडी. छाया: 5 विखुरू शकतो, 3 कठीण भावना टाळू शकतो.</p>\n<div class=\"use\">जगा: एक स्थिर साप्ताहिक प्रथा बनवा जी फक्त तुमची असेल. दोन स्वतंत्र जीवांना एक स्थिर बिंदू हवा.</div></div>\n\n<div class=\"soul-section\"><div class=\"sys\">चिनी · डे मास्टर</div><h3>लाकडी कुत्रा, पाण्याचा कोंबडा</h3>\n<p>रोमा यांग लाकडी कुत्रा, निष्ठावान आणि रक्षक. प्रशांत यिन पाण्याचा कोंबडा, तीक्ष्ण नजर, स्पष्ट. पाणी लाकडाला पोसतं, त्याची खोली तिच्या वाढीला पोसते.</p>\n<div class=\"use\">जगा: तिने निष्ठा व स्थैर्य द्यावं, त्याने स्पष्टता व बारकावा. हीच विभागणी शंभर भांडणं वाचवेल.</div></div>\n\n<div class=\"soul-section\"><div class=\"sys\">तारखा · ऊर्जा, निकाल नव्हे</div><h3>24 ते 27 डिसेंबर</h3>\n<p>खरा मुहूर्त पंडितजी पंचांगातून वाचतात. ते त्यांचं काम, माझं रचणं नव्हे. एवढंच: डिसेंबरचा शेवट धनु ऋतूत, रोमाची स्वतःची अग्नी.</p>\n<div class=\"use\">जगा: या चार तारखा दोघांच्या जन्मतपशिलांसह विश्वासू पंडिताकडे न्या. अ‍ॅपचं मत यादी असावी, पंडिताचं वचन अंतिम.</div></div>\n\n<div class=\"soul-section\"><div class=\"sys\">लक्षात ठेवण्याजोगी एक ओळ</div><h3>दोन श्रद्धावान, एक जमीन</h3>\n<p>दोन उदार, वाढीची भूक असलेली, गुरू-शासित माणसं काहीतरी विशाल उभं करतील, जर त्यांनी काहीतरी लहान, स्थिर आणि स्वतःचंही उभं करायचं लक्षात ठेवलं. दृष्टी स्वतःची काळजी घेईल. साध्याचं रक्षण करा.</p></div>"} };

function applyLang(){ document.body.className='lang-'+lang;

  document.querySelectorAll('.lang-switch button').forEach(b=>b.classList.toggle('on',b.dataset.l===lang));
  document.getElementById('newTodo').placeholder=T[lang].addTodo; document.getElementById('bCat').placeholder=T[lang].bCat; document.getElementById('bAmt').placeholder=T[lang].bAmt;
  const nw=document.getElementById('newWish'); if(nw) nw.placeholder=T[lang].addWish;
  document.getElementById('whoBtn').textContent=me?(T[lang].iam.replace('…','').trim()+' '+(T[lang].people[me]||me).split(' · ')[0]):T[lang].iam;
  buildWhoGrid(); renderAll(); if(document.getElementById('countdown')) renderCountdown(); }
function setLang(l){ lang=l; localStorage.setItem('wp_lang',l); applyLang(); }

function buildWhoGrid(){ const g=document.getElementById('whoGrid');
  g.innerHTML=Object.keys(PEOPLE).map(k=>{ const p=PEOPLE[k]; const label=T[lang].people[k]||k;
    return `<button onclick="setMe('${k}')"><span class="swatch" style="background:${p.color}"></span>${label}</button>`;}).join(''); }

function toggleCheck(k){ const wasMonth=parseInt(k.split('-')[0]); const before=monthProgress(wasMonth).pct;
  STATE.checks[k]=!STATE.checks[k]; commit(); renderPlanner();
  const after=monthProgress(wasMonth).pct;
  if(before<100 && after===100) celebrate(wasMonth); }
function castVote(id,i){ if(!me){openWho();return;} STATE.votes[id]=STATE.votes[id]||{}; STATE.votes[id][me]=i; commit(); renderDecisions(); }
function cycleVendor(i){ const o={wait:'replied',replied:'booked',booked:'wait'}; STATE.vendors[i]=o[STATE.vendors[i]||'wait']; commit(); renderVendors(); }
function addTodo(){ const el=document.getElementById('newTodo'),t=el.value.trim(); if(!t)return; STATE.todos.push({text:t,done:false,by:me||''}); el.value=''; commit(); renderTodos(); }
function toggleTodo(i){ STATE.todos[i].done=!STATE.todos[i].done; commit(); renderTodos(); }
function addBudget(){ const c=document.getElementById('bCat'),a=document.getElementById('bAmt'); if(!c.value.trim())return; STATE.budget.push({cat:c.value.trim(),amt:a.value.replace(/[^0-9]/g,'')||0}); c.value='';a.value=''; commit(); renderBudget(); }
function delBudget(i){ STATE.budget.splice(i,1); commit(); renderBudget(); }

function show(id,btn){ document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active');
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); window.scrollTo({top:0,behavior:'smooth'}); }
function openWho(){ document.getElementById('whoModal').classList.remove('hide'); }
function setMe(n){ me=n; localStorage.setItem('wp_me',n);
  document.getElementById('whoBtn').textContent=T[lang].iam.replace('…','').trim()+' '+(T[lang].people[n]||n).split(' · ')[0];
  document.getElementById('whoModal').classList.add('hide'); renderDecisions(); renderTodos(); }

async function commit(){ saveLocal(); if(!online)return;
  try{ await sb.from('wedding').upsert({code:WEDDING_CODE,data:STATE,updated:new Date().toISOString()}); }catch(e){ console.warn('push fail',e); } }
async function initCloud(){ const dot=document.getElementById('syncDot'),txt=document.getElementById('syncTxt');
  try{ sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
    const {data}=await sb.from('wedding').select('data').eq('code',WEDDING_CODE).maybeSingle();
    if(data&&data.data){ STATE=data.data; STATE.checks=STATE.checks||{};STATE.votes=STATE.votes||{};STATE.vendors=STATE.vendors||{};STATE.todos=STATE.todos||[];STATE.budget=STATE.budget||[];STATE.wishes=STATE.wishes||[]; saveLocal(); renderAll(); }
    else { await sb.from('wedding').upsert({code:WEDDING_CODE,data:STATE,updated:new Date().toISOString()}); }
    online=true; dot.className='dot on'; txt.textContent='live · synced';
    sb.channel('wp').on('postgres_changes',{event:'*',schema:'public',table:'wedding',filter:`code=eq.${WEDDING_CODE}`},p=>{ if(p.new&&p.new.data){ STATE=p.new.data; saveLocal(); renderAll(); }}).subscribe();
  }catch(e){ online=false; dot.className='dot off'; txt.textContent='offline · saved on phone'; console.warn('cloud fail',e); } }

/* ---- countdown ---- */
function renderCountdown(){
  const now=new Date(); const diff=WEDDING_DATE-now;
  const el=document.getElementById('countdown'); if(!el)return;
  const days=Math.ceil(diff/(1000*60*60*24));
  const word={en:days===1?'day to go':'days to go',hi:'दिन बाकी',mr:'दिवस बाकी'}[lang];
  if(days>0) el.innerHTML=`<span class="cd-num">${days}</span> ${word}`;
  else if(days===0) el.innerHTML={en:'✨ Today is the day ✨',hi:'✨ आज का दिन ✨',mr:'✨ आजचा दिवस ✨'}[lang];
  else el.innerHTML={en:'✨ Just married ✨',hi:'✨ विवाह संपन्न ✨',mr:'✨ विवाह संपन्न ✨'}[lang];
}
/* ---- celebration burst ---- */
function celebrate(mi){
  const layer=document.getElementById('petalLayer');
  const cols=['#e0a030','#e8a55f','#5fa89c','#e8c869','#d4a843'];
  for(let i=0;i<28;i++){
    const d=document.createElement('div'); d.className='burst';
    const x=Math.random()*100, sz=6+Math.random()*7, c=cols[i%cols.length], rot=Math.random()*360;
    d.style.cssText=`left:${x}vw;top:28vh;animation-delay:${Math.random()*.3}s;`;
    d.innerHTML=`<svg width="${sz*2}" height="${sz*2}" viewBox="0 0 12 12" style="transform:rotate(${rot}deg)"><path d="M6 1 Q10 5 6 11 Q2 5 6 1" fill="${c}"/></svg>`;
    layer.appendChild(d); setTimeout(()=>d.remove(),2600);
  }
  const M=MONTHS[lang][mi]; const msg={en:'done!',hi:'पूर्ण!',mr:'पूर्ण!'}[lang];
  const toast=document.createElement('div'); toast.className='celebrate-toast'; toast.innerHTML=`✨ ${M.m} ${msg} ✨`;
  document.body.appendChild(toast); setTimeout(()=>toast.remove(),2600);
}
/* ---- cultural animation builders ---- */
function buildToran(){
  let s=`<svg viewBox="0 0 400 34" preserveAspectRatio="none"><path d="M0 5 Q200 28 400 5" stroke="var(--gold)" stroke-width="1.5" fill="none"/>`;
  for(let x=14;x<400;x+=20){
    const dip=5+23*Math.sin((x/400)*Math.PI);
    s+=`<circle cx="${x}" cy="${dip+6}" r="2.3" fill="var(--rust)"/>`;
    s+=`<path d="M${x} ${dip+8} q-3 8 0 13 q3 -5 0 -13" fill="var(--p-roma)" opacity=".7"/>`;
  }
  document.getElementById('toran').innerHTML=s+`</svg>`;
}
function buildPetals(){
  const cols=['#e0a030','#e8a55f','#c8ae5c','#5fa89c'];
  let h='';
  for(let i=0;i<14;i++){
    const x=Math.random()*98, dur=8+Math.random()*7, del=-Math.random()*10, sz=5+Math.random()*5, c=cols[i%cols.length];
    h+=`<div class="petal" style="left:${x}vw;animation-duration:${dur}s;animation-delay:${del}s;">
      <svg width="${sz*2}" height="${sz*2}" viewBox="0 0 12 12"><path d="M6 1 Q10 5 6 11 Q2 5 6 1" fill="${c}" opacity=".8"/></svg></div>`;
  }
  document.getElementById('petalLayer').innerHTML=h;
}
function buildFrames(){
  // Warli (left, Maharashtra)
  const warli=`<svg viewBox="0 0 22 600" preserveAspectRatio="none" class="draw"><g stroke="var(--p-roma)" stroke-width="1.3" fill="none">
    ${[50,150,360,470,560].map(y=>`<g transform="translate(11,${y})"><circle r="3"/><line x1="0" y1="3" x2="0" y2="12"/><line x1="0" y1="6" x2="-5" y2="10"/><line x1="0" y1="6" x2="5" y2="10"/><line x1="0" y1="12" x2="-4" y2="19"/><line x1="0" y1="12" x2="4" y2="19"/></g>`).join('')}
    <g transform="translate(11,255)"><circle r="5"/><line x1="0" y1="-9" x2="0" y2="-6"/><line x1="0" y1="9" x2="0" y2="6"/><line x1="-9" y1="0" x2="-6" y2="0"/><line x1="9" y1="0" x2="6" y2="0"/></g></g></svg>`;
  // Jharokha + lotus + mandana (right, Rajasthan)
  const jhar=`<svg viewBox="0 0 22 600" preserveAspectRatio="none" class="draw"><g stroke="var(--p-pfam)" stroke-width="1.2" fill="none">
    ${[60,230,400,540].map(y=>`<g transform="translate(11,${y})"><path d="M-8 16 V4 a8 8 0 0 1 16 0 V16"/><path d="M-4 16 V7 a4 4 0 0 1 8 0 V16"/></g>`).join('')}
    <g transform="translate(11,145)"><circle r="7"/><path d="M0 -7 Q3 -3 0 0 Q-3 -3 0 -7"/><path d="M0 7 Q3 3 0 0 Q-3 3 0 7"/></g>
    <g transform="translate(11,320)"><path d="M0 -8 L6 0 L0 8 L-6 0 Z"/></g></g></svg>`;
  document.getElementById('frameL').innerHTML=warli;
  document.getElementById('frameR').innerHTML=jhar;
}

buildToran(); buildPetals(); buildFrames();
buildWhoGrid(); applyLang(); renderCountdown(); if(!me) openWho(); initCloud();
setInterval(renderCountdown, 60*60*1000);
document.getElementById('newTodo').addEventListener('keydown',e=>{if(e.key==='Enter')addTodo();});
</script>
